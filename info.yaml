# Tiny Tapeout project information
project:
  title: "Tiny8 autonomous CPU with external SPI instruction fetch"
  author: "Luis Javier"
  discord: ""
  description: "8-bit autonomous CPU that fetches 16-bit instructions from external SPI memory and outputs results on uo[7:0]."
  language: "Verilog"
  clock_hz: 50000000
  tiles: "1x1"
  top_module: "tt_um_tiny8_risclike"

  source_files:
    - "alu8.v"
    - "tiny8_cpu.v"
    - "tiny8_spi_fetch.v"
    - "tt_um_tiny8_risclike.v"

pinout:
  ui[0]: ""
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  uo[0]: "OUT[0]"
  uo[1]: "OUT[1]"
  uo[2]: "OUT[2]"
  uo[3]: "OUT[3]"
  uo[4]: "OUT[4]"
  uo[5]: "OUT[5]"
  uo[6]: "OUT[6]"
  uo[7]: "OUT[7]"

  uio[0]: "SPI_CS_N"
  uio[1]: "SPI_SCK"
  uio[2]: "SPI_MOSI"
  uio[3]: "SPI_MISO"
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

yaml_version: 6
